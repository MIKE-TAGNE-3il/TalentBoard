version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: talentboard-db
    environment:
      POSTGRES_DB: talentboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentboard-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: talentboard-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/talentboard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: talentboard-secret-key-change-in-production
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - talentboard-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: talentboard-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - talentboard-net

volumes:
  postgres-data:

networks:
  talentboard-net:
    driver: bridge
